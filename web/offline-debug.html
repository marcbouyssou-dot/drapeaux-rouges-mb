<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#032052">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AccèsDirectMK">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>Diagnostic PWA offline</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #032052;
      --panel: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.16);
      --text: #ffffff;
      --muted: #b8cae8;
      --ok: #54d18f;
      --warn: #ffd166;
      --ko: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 85% 18%, rgba(47, 128, 255, 0.20), transparent 30%),
        linear-gradient(180deg, #073a83 0%, #032052 45%, #021d45 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(92vw, 780px);
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    section {
      margin-top: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 17px;
    }

    dl {
      display: grid;
      grid-template-columns: minmax(150px, 220px) 1fr;
      gap: 10px 14px;
      margin: 0;
    }

    dt {
      color: var(--muted);
    }

    dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li {
      margin: 8px 0;
      overflow-wrap: anywhere;
    }

    code {
      color: #dce9ff;
    }

    .ok {
      color: var(--ok);
      font-weight: 700;
    }

    .warn {
      color: var(--warn);
      font-weight: 700;
    }

    .ko {
      color: var(--ko);
      font-weight: 700;
    }

    @media (max-width: 560px) {
      dl {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Diagnostic PWA offline</h1>
    <p id="timestamp">Diagnostic en cours...</p>

    <section>
      <h2>Service worker</h2>
      <dl id="sw-report"></dl>
    </section>

    <section>
      <h2>Installation iOS / PWA</h2>
      <dl id="install-report"></dl>
    </section>

    <section>
      <h2>Version active</h2>
      <dl id="version-report"></dl>
    </section>

    <section>
      <h2>Caches</h2>
      <ul id="cache-report"></ul>
    </section>

    <section>
      <h2>Fichiers critiques</h2>
      <ul id="resource-report"></ul>
    </section>

    <section>
      <h2>Fetch same-origin</h2>
      <dl id="fetch-report"></dl>
    </section>

    <section>
      <h2>Build marker</h2>
      <dl id="marker-report"></dl>
    </section>
  </main>

  <script>
    const appBuildMarker = 'authgate-fix-2026-06-18-1707';
    const criticalResources = [
      '/',
      'index.html',
      'flutter_bootstrap.js',
      'flutter.js',
      'main.dart.js',
      'manifest.json',
      'version.json',
      'assets/AssetManifest.bin',
      'assets/AssetManifest.bin.json',
      'assets/FontManifest.json',
      'assets/packages/cupertino_icons/assets/CupertinoIcons.ttf',
    ];

    const timestamp = document.getElementById('timestamp');
    const swReport = document.getElementById('sw-report');
    const installReport = document.getElementById('install-report');
    const versionReport = document.getElementById('version-report');
    const cacheReport = document.getElementById('cache-report');
    const resourceReport = document.getElementById('resource-report');
    const fetchReport = document.getElementById('fetch-report');
    const markerReport = document.getElementById('marker-report');

    function status(value) {
      return value ? '<span class="ok">oui</span>' : '<span class="ko">non</span>';
    }

    function row(label, value) {
      const dt = document.createElement('dt');
      const dd = document.createElement('dd');
      dt.textContent = label;
      dd.innerHTML = value;
      return [dt, dd];
    }

    function appendRows(target, rows) {
      for (const [label, value] of rows) {
        target.append(...row(label, value));
      }
    }

    function li(html) {
      const item = document.createElement('li');
      item.innerHTML = html;
      return item;
    }

    async function getRegistration() {
      if (!('serviceWorker' in navigator)) return null;
      return await navigator.serviceWorker.getRegistration();
    }

    function requestServiceWorkerVersion() {
      return new Promise((resolve) => {
        if (!navigator.serviceWorker || !navigator.serviceWorker.controller) {
          resolve(null);
          return;
        }

        const timeout = setTimeout(() => resolve(null), 1200);

        function listener(event) {
          if (!event.data || event.data.type !== 'PWA_DEBUG_VERSION_RESPONSE') {
            return;
          }

          clearTimeout(timeout);
          navigator.serviceWorker.removeEventListener('message', listener);
          resolve(event.data);
        }

        navigator.serviceWorker.addEventListener('message', listener);
        navigator.serviceWorker.controller.postMessage({ type: 'PWA_DEBUG_VERSION' });
      });
    }

    async function runDiagnostic() {
      timestamp.textContent = `Diagnostic généré le ${new Date().toLocaleString()}`;

      const manifestLink = document.querySelector('link[rel="manifest"]');
      const displayModeStandalone = window.matchMedia('(display-mode: standalone)').matches;
      const navigatorStandalone =
        typeof navigator.standalone === 'boolean' ? navigator.standalone : null;
      const appleCapable = document.querySelector('meta[name="apple-mobile-web-app-capable"]');
      const mobileCapable = document.querySelector('meta[name="mobile-web-app-capable"]');
      const appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
      const appleStatusBar = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
      const appleTouchIcon = document.querySelector('link[rel="apple-touch-icon"]');

      appendRows(installReport, [
        ['display-mode standalone', status(displayModeStandalone)],
        ['navigator.standalone iOS', navigatorStandalone === null ? '<span class="warn">non disponible</span>' : status(navigatorStandalone)],
        ['manifest link', manifestLink ? `<code>${manifestLink.getAttribute('href')}</code>` : '<span class="ko">absent</span>'],
        ['apple capable', appleCapable ? `<code>${appleCapable.getAttribute('content')}</code>` : '<span class="ko">absent</span>'],
        ['mobile capable', mobileCapable ? `<code>${mobileCapable.getAttribute('content')}</code>` : '<span class="ko">absent</span>'],
        ['apple title', appleTitle ? `<code>${appleTitle.getAttribute('content')}</code>` : '<span class="ko">absent</span>'],
        ['apple status bar', appleStatusBar ? `<code>${appleStatusBar.getAttribute('content')}</code>` : '<span class="ko">absent</span>'],
        ['apple touch icon', appleTouchIcon ? `<code>${appleTouchIcon.getAttribute('href')}</code>` : '<span class="ko">absent</span>'],
      ]);

      try {
        const manifestResponse = await fetch('manifest.json', { cache: 'no-store' });
        const manifest = await manifestResponse.json();
        appendRows(installReport, [
          ['manifest name', `<code>${manifest.name || ''}</code>`],
          ['manifest short_name', `<code>${manifest.short_name || ''}</code>`],
          ['manifest display', `<code>${manifest.display || ''}</code>`],
          ['manifest start_url', `<code>${manifest.start_url || ''}</code>`],
          ['manifest scope', `<code>${manifest.scope || ''}</code>`],
          ['manifest icons', `<code>${Array.isArray(manifest.icons) ? manifest.icons.length : 0}</code>`],
        ]);
      } catch (error) {
        appendRows(installReport, [
          ['manifest fetch', '<span class="ko">exception</span>'],
          ['manifest erreur', `<code>${String(error)}</code>`],
        ]);
      }

      const swSupported = 'serviceWorker' in navigator;
      const controller = swSupported ? navigator.serviceWorker.controller : null;
      const registration = await getRegistration();
      const active = registration && registration.active;
      const waiting = registration && registration.waiting;
      const installing = registration && registration.installing;

      appendRows(swReport, [
        ['serviceWorker supporté', status(swSupported)],
        ['controller actif', status(Boolean(controller))],
        ['controller scriptURL', controller ? `<code>${controller.scriptURL}</code>` : '<span class="warn">absent</span>'],
        ['registration scope', registration ? `<code>${registration.scope}</code>` : '<span class="warn">absente</span>'],
        ['active scriptURL', active ? `<code>${active.scriptURL}</code>` : '<span class="warn">absent</span>'],
        ['active state', active ? `<code>${active.state}</code>` : '<span class="warn">absent</span>'],
        ['waiting state', waiting ? `<code>${waiting.state}</code>` : 'absent'],
        ['installing state', installing ? `<code>${installing.state}</code>` : 'absent'],
      ]);

      const workerVersion = await requestServiceWorkerVersion();
      appendRows(versionReport, [
        ['service worker version', workerVersion ? `<code>${workerVersion.version}</code>` : '<span class="warn">non reçue</span>'],
        ['service worker buildId', workerVersion ? `<code>${workerVersion.buildId}</code>` : '<span class="warn">non reçu</span>'],
        ['cache actif annoncé', workerVersion ? `<code>${workerVersion.cacheName}</code>` : '<span class="warn">non reçu</span>'],
      ]);

      if (!('caches' in window)) {
        cacheReport.append(li('<span class="ko">Cache API non supportée</span>'));
        resourceReport.append(li('<span class="ko">Impossible de vérifier les caches</span>'));
      } else {
        const cacheNames = await caches.keys();
        if (cacheNames.length === 0) {
          cacheReport.append(li('<span class="ko">Aucun cache présent</span>'));
        } else {
          for (const name of cacheNames) {
            cacheReport.append(li(`<code>${name}</code>`));
          }
        }

        const resourcesToCheck = [...criticalResources];
        if (workerVersion && workerVersion.buildId) {
          resourcesToCheck.push(`flutter_bootstrap.js?v=${workerVersion.buildId}`);
        }

        for (const resource of resourcesToCheck) {
          const match = await caches.match(resource);
          const cleanResource = resource.split('?')[0];
          const cleanMatch = await caches.match(cleanResource);
          resourceReport.append(
            li(`${match ? '<span class="ok">présent direct</span>' : '<span class="ko">direct manquant</span>'} / ${cleanMatch ? '<span class="ok">sans query présent</span>' : '<span class="ko">sans query manquant</span>'} <code>${resource}</code>`)
          );
        }
      }

      try {
        const response = await fetch('main.dart.js', { cache: 'no-store' });
        const mainJs = await response.clone().text();
        appendRows(fetchReport, [
          ['main.dart.js fetch', response.ok ? '<span class="ok">OK</span>' : '<span class="ko">échec</span>'],
          ['status', `<code>${response.status} ${response.statusText}</code>`],
          ['url', `<code>${response.url}</code>`],
        ]);
        appendRows(markerReport, [
          ['marker attendu', `<code>${appBuildMarker}</code>`],
          ['marker dans main.dart.js', mainJs.includes(appBuildMarker) ? '<span class="ok">présent</span>' : '<span class="ko">absent</span>'],
        ]);
      } catch (error) {
        appendRows(fetchReport, [
          ['main.dart.js fetch', '<span class="ko">exception</span>'],
          ['erreur', `<code>${String(error)}</code>`],
        ]);
        appendRows(markerReport, [
          ['marker attendu', `<code>${appBuildMarker}</code>`],
          ['marker dans main.dart.js', '<span class="ko">non vérifiable</span>'],
        ]);
      }

      const bootstrapSrc = workerVersion && workerVersion.buildId
        ? `flutter_bootstrap.js?v=${workerVersion.buildId}`
        : 'flutter_bootstrap.js';

      try {
        const bootstrapResponse = await fetch(bootstrapSrc, { cache: 'no-store' });
        appendRows(fetchReport, [
          ['flutter_bootstrap.js versionné fetch', bootstrapResponse.ok ? '<span class="ok">OK</span>' : '<span class="ko">échec</span>'],
          ['bootstrap src', `<code>${bootstrapSrc}</code>`],
          ['bootstrap status', `<code>${bootstrapResponse.status} ${bootstrapResponse.statusText}</code>`],
          ['bootstrap url', `<code>${bootstrapResponse.url}</code>`],
        ]);
      } catch (error) {
        appendRows(fetchReport, [
          ['flutter_bootstrap.js versionné fetch', '<span class="ko">exception</span>'],
          ['bootstrap src', `<code>${bootstrapSrc}</code>`],
          ['bootstrap erreur', `<code>${String(error)}</code>`],
        ]);
      }
    }

    runDiagnostic();
  </script>
</body>
</html>
